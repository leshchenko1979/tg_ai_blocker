services:
  ai-antispam:
    image: ${GHCR_IMAGE:-ghcr.io/leshchenko1979/ai-antispam}:${IMAGE_TAG:-main}
    container_name: ai-antispam
    mem_limit: 256mb
    mem_reservation: 128mb
    cpus: 0.5
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    networks:
      - traefik-public
    volumes:
      - ${LOGS_DIR:-/home/${REMOTE_USER:-root}/logs}:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 1
      start_period: 60s

networks:
  traefik-public:
    external: true