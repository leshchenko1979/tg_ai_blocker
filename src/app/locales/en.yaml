start:
  welcome: |
    🤖 <b>Welcome to AI Anti-Spam!</b>

    I'm your smart protector against spam in Telegram groups.

    🚀 <b>Getting started:</b>
    1. Add me to your group
    2. Make me an administrator
    3. Done! I'll start working automatically

    💡 Use /help for the full command list

    📢 News: https://t.me/ai_antispam
    🌐 Website: https://ai-antispam.ru
  existing_user: |
    👋 <b>Welcome back!</b>

    📊 /stats — check balance and groups
    💡 /help — all available commands

    I keep protecting your groups from spam! ✨
  linked_channel_offer: "You have a channel {channel_display}. Want to enable comment protection?"

help:
  main: |
    🤖 <b>AI Anti-Spam Bot</b> - your Telegram spam protector
    🌐 Project website: <a href="https://ai-antispam.ru">ai-antispam.ru</a>

    <b>🚀 Quick start:</b>
    1. Add me to your group
    2. Make me an administrator
    3. I'll start protecting automatically!

    <b>💡 What I do:</b>
    • Analyze messages with AI
    • Delete spam and ban violators
    • Learn from your examples
    • Notify about suspicious content

    <b>💰 Payment:</b> Telegram Stars (buy via /buy)

    Select a section for details:
  getting_started: |
    <b>🚀 How to start using the bot:</b>

    <b>For groups (easiest):</b>
    Use this link to add me with the right permissions in one click: <a href="{add_to_group_url}">Add to group</a>

    <b>If you already added me manually:</b>
    1. Open group settings -> Administrators
    2. Find me or tap "Add administrator" and select @ai_spam_blocker_bot
    3. Enable: Delete messages, Ban users
    4. Done!

    <b>For channels with comments:</b>
    Use the same link: <a href="{add_to_group_url}">Add to group</a> — when the group selection appears, choose your channel's <b>discussion group</b> (not the channel itself!). The bot will get the right permissions automatically.

    <b>Detailed guide:</b>
    https://t.me/ai_antispam/14

    After setup I'll send you a personal confirmation that I'm ready.
  training: |
    <b>📚 Training the bot with your examples:</b>

    To help the bot understand what counts as spam:

    1. <b>Forward a suspicious message</b> to me in private
    2. I'll analyze it and show the result
    3. <b>Tap the rating button:</b>
       • "Spam" - bot will remember as bad example
       • "Not spam" - bot will remember as good example

    <b>The more examples you provide, the better the protection!</b>

    Examples help the bot tell apart:
    • Spam links from useful links
    • Scam messages from normal chat
    • Suspicious channels from legitimate ones

    <b>Tip:</b> Train the bot regularly for best protection.
  moderation: |
    <b>⚙️ What the bot checks:</b>

    <b>✅ Moderated:</b>
    • All messages from new members
    • Text messages
    • Photos, videos, documents, stickers
    • Voice and video messages
    • Forwarded messages
    • Auto-blocks forwarded stories
    • Deletes join/leave messages

    <b>❌ Not moderated:</b>
    • Administrator messages
    • System notifications (except join/leave)
    • Edited messages
    • Group name/photo changes

    <b>🤖 How AI works:</b>
    The bot analyzes context, links, channels and sender behavior. The more spam examples you provide, the more accurate the protection.
  commands: |
    <b>💡 Available commands:</b>

    /start - welcome and get started
    /help - this help
    /buy - buy stars for payment
    /stats - balance and group status
    /mode - toggle mode (delete/notify)
    /ref - get referral link
    /lang - change language

    <b>💬 Free-form chat:</b>
    Just write to me in private, e.g.:
    • "how do you detect spam?"
    • "what if the bot doesn't work?"
    • "how to add to a channel?"

    I'll answer any questions!
  support: |
    <b>🔧 Support and updates:</b>

    <b>📢 Official channel:</b>
    @ai_antispam

    <b>👨‍💻 Technical support:</b>
    @leshchenko1979

    <b>📖 Documentation:</b>
    • Project website: https://ai-antispam.ru
    • How the bot detects spam: https://t.me/ai_antispam/7
    • Channel setup: https://t.me/ai_antispam/14

    <b>💬 How to get help:</b>
    • Contact support with a description
    • Include group ID and message examples
    • We reply within 24 hours

    <b>🐛 Report an issue:</b>
    Send error logs and screenshots - that helps us fix it faster.
  payment: |
    <b>💰 Payment and balance:</b>

    The bot runs on Telegram Stars ⭐

    <b>💡 How to top up:</b>
    • Use the /buy command
    • Select the amount of stars
    • Pay via Telegram

    <b>📊 Star usage:</b>
    • New members: 1 star per check — whether we approve or block
    • Approved members: chat for free 💚
    • When stars run out: moderation stops

    <b>📈 Usage stats:</b>
    • /stats - check current balance
    • Weekly spend statistics

    <b>🎁 Free for new users:</b>
    You get <b>100 stars</b> as a welcome gift! ⭐
  back_button: "⬅️ Back to help"
  default_page: "Information temporarily unavailable. Please try again later."
  buttons:
    getting_started: "🚀 Getting started"
    training: "📚 Bot training"
    moderation: "⚙️ What's checked"
    commands: "💡 Commands"
    payment: "💰 Payment"
    support: "🔧 Support"

