name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
      - 'uv.lock'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io/leshchenko1979/ai-antispam
  BOT_TOKEN: "123456789:ABCdefGhIJKlmNoPQRsTUVwxyZ0123456789"

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache test artifacts
        uses: actions/cache@v4
        with:
          path: |
            .pytest_cache
            .ruff_cache
            .mypy_cache
          key: test-cache-${{ runner.os }}-${{ hashFiles('uv.lock') }}-${{ hashFiles('src/**/*.py') }}
          restore-keys: |
            test-cache-${{ runner.os }}-${{ hashFiles('uv.lock') }}-
            test-cache-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Lint
        run: uvx ruff check src

      - name: Type check
        run: uvx ty check src

      - name: Run tests
        run: USE_SQLITE_TESTS=true uv run pytest --ignore=tests/integration -v --tb=short -x

      - name: Set image repo output
        id: vars
        run: echo "image_repo=${{ env.IMAGE_REGISTRY }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}:main
            ${{ env.IMAGE_REGISTRY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    env:
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      GHCR_PULL_USER: ${{ secrets.GHCR_PULL_USER }}
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          envs: GHCR_PULL_TOKEN, GHCR_PULL_USER
          script: |
            set -euo pipefail
            cd /data/projects/ai-antispam
            if [ -n "${GHCR_PULL_TOKEN:-}" ] && [ -n "${GHCR_PULL_USER:-}" ]; then
              echo "${GHCR_PULL_TOKEN:-}" | docker login ghcr.io -u "${GHCR_PULL_USER:-}" --password-stdin
            fi
            docker compose pull && docker compose up -d --wait

      - name: Prune old images
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            docker images --format '{{.ID}} {{.Repository}}:{{.Tag}}' | 
              grep 'ghcr.io/leshchenko1979/ai-antispam' | 
              grep -v ':main$' | awk '{print $1}' | xargs -r docker rmi -f
