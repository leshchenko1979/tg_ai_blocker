# This file is a port of the bot's prompt for private messages.
# It should not contain any sensitive information.

pricing:
  initial_credits: 100  # Начальные кредиты для новых пользователей
  approve_price: 1      # Стоимость одобрения нового участника
  delete_price: 1       # Стоимость удаления спама
  skip_price: 0         # Стоимость пропуска (всегда 0)

billing:
  low_balance_threshold: 50   # Stars below which "week ahead" warning applies
  depletion_grace_days: 7     # Days from depletion to leaving groups
  warn_day_after: true        # Day 1: "bot leaves groups in 7 days"
  warn_day_before: true       # Day 6: "bot leaves tomorrow"

# Threshold for auto-delete: spam with score >= this is high-confidence (may auto-delete).
# Spam with 50 < score < threshold is low-confidence (notify only, admin confirms).
spam:
  high_confidence_threshold: 90

system:
  admin_chat_id: 133526395  # ID администратора для уведомлений
  bot_username: "ai_spam_blocker_bot"  # Bot username for deep links
  project_channel: "https://t.me/ai_antispam"  # URL канала проекта
  project_website: "https://ai-antispam.ru"  # URL сайта проекта
  spam_guide_url: "https://t.me/ai_antispam/7"  # URL гайда по спаму
  setup_guide_url: "https://t.me/ai_antispam/14"  # URL гайда по настройке
  affiliate_url: "https://telegram.org/tour/affiliate-programs/"  # URL партнерской программы
  webhook_timeout: 55  # Таймаут вебхука в секундах

help_text: |
  🤖 <b>AI Антиспам Бот</b> - ваш защитник от спама в Telegram
  🌐 Сайт проекта: <a href="https://ai-antispam.ru">ai-antispam.ru</a>

  <b>🚀 Быстрый старт:</b>
  1. Добавьте меня в группу
  2. Сделайте администратором
  3. Я начну защищать автоматически!

  <b>💡 Что я делаю:</b>
  • Анализирую сообщения ИИ
  • Удаляю спам и баню нарушителей
  • Учусь на ваших примерах
  • Уведомляю о подозрительном контенте

  <b>💰 Оплата:</b> Telegram Stars (купить /buy)

  Выберите раздел для подробностей:

help_getting_started_text: |
  <b>🚀 Как начать использовать бота:</b>

  <b>Для групп (проще всего):</b>
  Используйте ссылку: https://t.me/ai_spam_blocker_bot?startgroup&admin=delete_messages+restrict_members

  <b>Если уже добавили вручную:</b>
  1. Откройте настройки группы -> Администраторы
  2. Найдите меня или добавьте @ai_spam_blocker_bot
  3. Включите: Удаление сообщений, Блокировка пользователей
  4. Готово!

  <b>Для каналов с комментариями:</b>
  Используйте ссылку https://t.me/ai_spam_blocker_bot?startgroup&admin=delete_messages+restrict_members
  В списке выберите группу обсуждения канала (не сам канал!). Права выдадутся автоматически.

  <b>Подробная инструкция:</b>
  https://t.me/ai_antispam/14

  После настройки я пришлю вам личное подтверждение о готовности к работе.

help_training_text: |
  <b>📚 Обучение бота на ваших примерах:</b>

  Чтобы бот лучше понимал, что считать спамом:

  1. <b>Перешлите подозрительное сообщение</b> мне в личку
  2. Я проанализирую его и покажу результат
  3. <b>Нажмите кнопку оценки:</b>
     • "Это спам" - бот запомнит как плохой пример
     • "Не спам" - бот запомнит как хороший пример

  <b>Чем больше примеров вы дадите - тем точнее будет защита!</b>

  Примеры помогают боту отличать:
  • Спам-ссылки от полезных ссылок
  • Мошеннические сообщения от нормального общения
  • Подозрительные каналы от легитимных

  <b>Совет:</b> Обучайте бота регулярно для лучшей защиты.

help_moderation_text: |
  <b>⚙️ Что проверяет бот:</b>

  <b>✅ Модерируется:</b>
  • Все сообщения от новых участников
  • Текстовые сообщения
  • Фото, видео, документы, стикеры
  • Голосовые и видеосообщения
  • Пересланные сообщения
  • Автоматически блокирует пересланные истории
  • Удаляет сообщения о вступлении/выходе участников

  <b>❌ Не модерируется:</b>
  • Сообщения администраторов
  • Системные уведомления (кроме вступления/выхода)
  • Отредактированные сообщения
  • Изменения названия/фото группы

  <b>🤖 Как работает ИИ:</b>
  Бот анализирует контекст, ссылки, каналы и поведение отправителя. Чем больше примеров спама вы предоставите, тем точнее будет защита.

help_commands_text: |
  <b>💡 Доступные команды:</b>

  /start - приветствие и начало работы
  /help - эта справка
  /buy - купить звёзды для оплаты
  /stats - баланс и статус групп
  /mode - переключить режим (удаление/уведомления)
  /ref - получить реферальную ссылку

  <b>💬 Свободное общение:</b>
  Вы можете просто написать мне в личку, например:
  • "как ты определяешь спам?"
  • "что делать если бот не работает?"
  • "как добавить в канал?"

  Я отвечу на любые вопросы!

help_support_text: |
  <b>🔧 Поддержка и обновления:</b>

  <b>📢 Официальный канал:</b>
  @ai_antispam

  <b>👨‍💻 Техническая поддержка:</b>
  @leshchenko1979

  <b>📖 Документация:</b>
  • Сайт проекта: https://ai-antispam.ru
  • Как бот отличает спам: https://t.me/ai_antispam/7
  • Подключение к каналам: https://t.me/ai_antispam/14

  <b>💬 Как получить помощь:</b>
  • Напишите в поддержку с описанием проблемы
  • Укажите ID группы и примеры сообщений
  • Мы ответим в течение 24 часов

  <b>🐛 Сообщить о проблеме:</b>
  Присылайте логи ошибок и скриншоты - это поможет быстрее решить вопрос.

help_payment_text: |
  <b>💰 Оплата и баланс:</b>

  Бот работает на основе Telegram Stars ⭐

  <b>💡 Как пополнить баланс:</b>
  • Используйте команду /buy
  • Выберите нужное количество звёзд
  • Оплатите через Telegram

  <b>📊 Расход звёзд:</b>
  • Анализ сообщений: всегда бесплатно
  • Новые участники: 1 звезда за первое сообщение
  • Одобренные участники: общаются бесплатно 💚
  • При нехватке звёзд: модерация отключается

  <b>📈 Статистика использования:</b>
  • /stats - посмотреть текущий баланс
  • Еженедельная статистика расходов

  <b>🎁 Бесплатно для новых пользователей:</b>
  При первом использовании вы получаете <b>100 звёзд</b> в подарок! ⭐

